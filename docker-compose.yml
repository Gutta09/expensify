version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: expenseiq-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: expenseiq
    volumes:
      - mongodb_data:/data/db
    networks:
      - expenseiq

  # Redis (for caching & rate limiting)
  redis:
    image: redis:7-alpine
    container_name: expenseiq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - expenseiq

  # Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: expenseiq-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/expenseiq?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ML_SERVICE_URL: http://ml-service:5001
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID}
      PLAID_SECRET: ${PLAID_SECRET}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      POWERBI_CLIENT_ID: ${POWERBI_CLIENT_ID}
      POWERBI_CLIENT_SECRET: ${POWERBI_CLIENT_SECRET}
      POWERBI_TENANT_ID: ${POWERBI_TENANT_ID}
      POWERBI_WORKSPACE_ID: ${POWERBI_WORKSPACE_ID}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    depends_on:
      - mongodb
      - redis
    networks:
      - expenseiq

  # Python ML Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: expenseiq-ml
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: production
      MONGODB_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/expenseiq?authSource=admin
    volumes:
      - ml_models:/app/models
    depends_on:
      - mongodb
    networks:
      - expenseiq

  # React Frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: expenseiq-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - expenseiq

volumes:
  mongodb_data:
  redis_data:
  ml_models:

networks:
  expenseiq:
    driver: bridge
